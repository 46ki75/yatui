pre-commit:
  parallel: true
  jobs:
    - name: rustfmt
      glob: "**/*.rs"
      run: cargo fmt --all
      stage_fixed: true
    - name: markdownlint
      glob: "**/*.md"
      run: pnpm exec markdownlint-cli2 --fix {staged_files}
      stage_fixed: true

pre-push:
  jobs:
    - name: ci
      run: just ci

check:
  parallel: true
  jobs:
    - name: rustfmt
      glob: "**/*.rs"
      run: cargo fmt --all
    - name: markdownlint
      glob: "**/*.md"
      run: pnpm exec markdownlint-cli2 {files}
