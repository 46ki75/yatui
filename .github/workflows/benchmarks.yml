name: Benchmarks

on:
  schedule:
    - cron: "41 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    name: Record baseline
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Record Criterion baseline
        run: >-
          cargo bench -p arborui --bench stabilization --all-features --
          --save-baseline current --noplot

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: criterion-${{ github.sha }}
          path: target/criterion
          if-no-files-found: error
          retention-days: 30

      - name: Enforce application regression limits
        run: >-
          cargo test --release -p arborui-example-focus-queue
          --test slow_sink_metrics --all-features -- --ignored --nocapture
