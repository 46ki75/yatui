name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish packages instead of running a dry run
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Verify and publish
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    environment: crates-io
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install MSRV Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          components: clippy,rustfmt

      - name: Install release Cargo
        run: rustup toolchain install 1.90.0 --profile minimal

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Install Node.js dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify workspace
        run: just ci

      - name: Verify package contents
        run: just package-check

      - name: Dry-run coordinated publication
        if: ${{ !inputs.publish }}
        run: bash scripts/publish.sh --dry-run

      - name: Publish coordinated release
        if: ${{ inputs.publish }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          YATUI_CRATES_IO_NAME_CONFIRMED: ${{ vars.YATUI_CRATES_IO_NAME_CONFIRMED }}
        run: bash scripts/publish.sh --execute
