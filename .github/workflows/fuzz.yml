name: Fuzz

on:
  pull_request:
    paths:
      - ".github/workflows/fuzz.yml"
      - "crates/**"
      - "fuzz/**"
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: ${{ matrix.target }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target: [text_edit_sequences, render_transactions]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2026-07-01

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz

      - name: Install cargo-fuzz
        run: cargo +nightly-2026-07-01 install cargo-fuzz --version 0.13.2 --locked

      - name: Run bounded fuzzing
        run: >-
          cargo +nightly-2026-07-01 fuzz run ${{ matrix.target }}
          fuzz/corpus/${{ matrix.target }} -- -max_total_time=60

      - name: Upload failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-${{ matrix.target }}-artifacts
          path: fuzz/artifacts/${{ matrix.target }}
          if-no-files-found: ignore
