schema_version: 1
research_date: "2026-07-16"
description: >-
  Atomic lessons extracted from the 19 project reports. Observed contracts
  describe the examined project; implications and actions concern ArborUI.
action_values:
  - adopt
  - preserve
  - avoid
  - differentiate
  - investigate
  - defer
  - non-goal
theme_values:
  - output-recovery
  - terminal-modes
  - input-protocol
  - text-unicode
  - identity-interaction
  - effects-scheduling
  - layout-virtualization
  - extension-boundaries
  - testing
  - ecosystem-ergonomics
notes:
  - "A repeated lesson is not a vote; projects can share implementations or assumptions."
  - "Brief adjacent tools have runtime criteria marked outside scope rather than unsupported."
  - "Evidence status applies to the observed contract. ArborUI implications may still require follow-up."

lessons:
  - id: "RATATUI-OUTPUT-RECOVERY-01"
    project: "Ratatui"
    category: "rendering-widget-library"
    theme: "output-recovery"
    requirement: "Commit logical frame state only after complete output acceptance."
    observation: "Terminal swaps logical buffers before final backend flush, so failed output can leave logical and physical state inconsistently advanced."
    implication: "Keep prepared-frame commit and physical-state invalidation after uncertain output."
    action: "preserve"
    counterweight: "Terminating the session is adequate and simpler for many local TUIs."
    evidence_status: "verified"
    confidence: "high"
    scope: "Current full-screen draw failures."
    source: "../reports/ratatui.md"
    source_lines: "323-352"
    follow_up: "Inject failure at every patch boundary and require the next successful write to repaint fully."

  - id: "RATATUI-EXTENSION-BOUNDARIES-02"
    project: "Ratatui"
    category: "rendering-widget-library"
    theme: "extension-boundaries"
    requirement: "Give widget authors a small contract independent of application and backend policy."
    observation: "Ratatui separates its facade, core widget contract, widget catalog, and backend-specific crates."
    implication: "Keep the ArborUI facade distinct from widget-author and backend-author surfaces."
    action: "adopt"
    counterweight: "More crates increase release coordination and do not create an ecosystem by themselves."
    evidence_status: "verified"
    confidence: "high"
    scope: "Current crate architecture."
    source: "../reports/ratatui.md"
    source_lines: "267-273"
    follow_up: null

  - id: "RATATUI-TESTING-03"
    project: "Ratatui"
    category: "rendering-widget-library"
    theme: "testing"
    requirement: "Test widgets and complete logical frames through production rendering code."
    observation: "Buffer tests exercise widget painting, while TestBackend also exercises diffing, viewport, cursor, and logical scrollback behavior."
    implication: "Keep direct semantic frame assertions and complete in-memory screen tests as public paths."
    action: "adopt"
    counterweight: "Logical backends do not cover input, output faults, PTY lifecycle, or physical terminal behavior."
    evidence_status: "verified"
    confidence: "high"
    scope: "Headless widget and logical-screen testing."
    source: "../reports/ratatui.md"
    source_lines: "275-281"
    follow_up: "Document a direct widget-frame test and retain separate PTY and fault-injection layers."

  - id: "RATATUI-INPUT-PROTOCOL-04"
    project: "Ratatui"
    category: "rendering-widget-library"
    theme: "input-protocol"
    requirement: "Coordinate terminal protocol replies with application input."
    observation: "Inline cursor queries share the terminal byte stream with application input, allowing another reader to consume the reply."
    implication: "Keep one input owner that classifies protocol replies before application events."
    action: "preserve"
    counterweight: "Applications can query before input starts or provide tracked cursor state."
    evidence_status: "supported"
    confidence: "medium"
    scope: "Future inline mode and cursor-position queries."
    source: "../reports/ratatui.md"
    source_lines: "354-379"
    follow_up: "Test a fragmented cursor reply while ordinary key input is queued."

  - id: "RATATUI-ECOSYSTEM-ERGONOMICS-05"
    project: "Ratatui"
    category: "rendering-widget-library"
    theme: "ecosystem-ergonomics"
    requirement: "Show that stronger framework guarantees reduce total application cost."
    observation: "The report did not measure whether ArborUI's added policy offsets Ratatui's simpler model and larger widget ecosystem."
    implication: "Treat productivity and adoption superiority as unproven."
    action: "investigate"
    counterweight: "Ratatui leaves focus, routing, scheduling, and lifecycle policy to applications."
    evidence_status: "inferred"
    confidence: "low"
    scope: "Cross-project application cost."
    source: "../reports/ratatui.md"
    source_lines: "624-634"
    follow_up: "Build the same moderate application with both facades and compare code, tests, widgets, and failure handling."

  - id: "BUBBLE-TEA-TERMINAL-MODES-01"
    project: "Bubble Tea"
    category: "application-framework"
    theme: "terminal-modes"
    requirement: "Keep terminal mode state synchronized with the view that needs it."
    observation: "Bubble Tea v2 declares screen, mouse, focus, cursor, paste, keyboard, color, and title state in View and transitions from the previous declaration."
    implication: "Associate desired terminal state with prepared view or frame state instead of scattered imperative commands."
    action: "adopt"
    counterweight: "Declarative fields do not eliminate mode-specific ownership or physical recovery."
    evidence_status: "supported"
    confidence: "medium"
    scope: "Current inline and alternate-screen rendering."
    source: "../reports/bubble-tea.md"
    source_lines: "299-313"
    follow_up: null

  - id: "BUBBLE-TEA-EFFECTS-SCHEDULING-02"
    project: "Bubble Tea"
    category: "application-framework"
    theme: "effects-scheduling"
    requirement: "Cancel effects with their owner and reject stale completion."
    observation: "Each command runs in its own goroutine without framework cancellation, and shutdown does not wait for or cancel commands."
    implication: "Make effect identity, ownership, cancellation, and stale-result handling explicit."
    action: "avoid"
    counterweight: "The small command contract is approachable and avoids waiting on short effects during shutdown."
    evidence_status: "verified"
    confidence: "high"
    scope: "Current command runtime."
    source: "../reports/bubble-tea.md"
    source_lines: "385-406"
    follow_up: "Test screen removal, shutdown, and stale completion with controlled long-running effects."

  - id: "BUBBLE-TEA-OUTPUT-RECOVERY-03"
    project: "Bubble Tea"
    category: "application-framework"
    theme: "output-recovery"
    requirement: "Distinguish complete, deferred, failed, and physically uncertain output."
    observation: "Renderer writes use ordinary writer semantics, some flush errors can be discarded, and no physical-state invalidation is exposed."
    implication: "Keep commit-after-acceptance and forced repaint after uncertainty."
    action: "preserve"
    counterweight: "Fatal output handling is simpler for applications that do not continue the session."
    evidence_status: "verified"
    confidence: "high"
    scope: "Current renderer output path."
    source: "../reports/bubble-tea.md"
    source_lines: "408-432"
    follow_up: "Compare prefix writes, flush failures, and delayed acceptance."

