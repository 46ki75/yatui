    category: "application-framework"
    theme: "testing"
    requirement: "Drive a complete application with controlled time, effects, settlement, and semantic inspection."
    observation: "Production programs can use byte buffers, but the public API lacks fake clocks, deterministic command completion, and run-until-idle."
    implication: "Differentiate with a public harness that controls the complete production runtime."
    action: "differentiate"
    counterweight: "Bubble Tea exposes useful input, output, size, profile, context, and message seams."
